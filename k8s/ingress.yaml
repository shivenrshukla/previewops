apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: preview-ingress
  annotations:
    nginx.ingress.kubernetes.io/enable-cors: "true" # Required for your React fetch!
spec:
  ingressClassName: nginx
  rules:
  - host: "env-DYNAMIC_ENV.previewops.local" # Frontend Host
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: preview-service
            port:
              number: 80
  - host: "api-env-DYNAMIC_ENV.previewops.local" # Backend Host (matches your JS logic)
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: preview-service
            port:
              number: 80 # The unified service port