apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: preview-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
  - host: "env-DYNAMIC_ENV.previewops.local" # Our fake test URL
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: preview-service
            port:
              number: 80