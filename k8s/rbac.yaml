apiVersion: v1
kind: ServiceAccount
metadata:
  name: preview-bridge-sa
  namespace: NAMESPACE_PLACEHOLDER
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: preview-bridge-namespace-reader
rules:
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: preview-bridge-namespace-reader-binding-NAMESPACE_PLACEHOLDER
subjects:
- kind: ServiceAccount
  name: preview-bridge-sa
  namespace: NAMESPACE_PLACEHOLDER
roleRef:
  kind: ClusterRole
  name: preview-bridge-namespace-reader
  apiGroup: rbac.authorization.k8s.io
